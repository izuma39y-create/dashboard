<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #06090f; --card: #0c1220; --border: #192840;
    --text: #dde4f0; --muted: #3a5070; --dim: #7a90a8;
    --wx: #38bdf8; --ni: #fbbf24; --btc: #f97316; --news: #34d399;
    --neg: #f87171; --pos: #34d399;
  }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; font-family: 'Meiryo', 'メイリオ', 'Hiragino Kaku Gothic ProN', sans-serif; }
  body { padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px) 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; padding: 32px 16px; }
  #setup h1 { font-size: 20px; font-weight: 700; color: var(--text); }
  #setup p { font-size: 13px; color: var(--dim); text-align: center; line-height: 1.6; max-width: 300px; }
  #setup a { color: var(--wx); }
  #apiKeyInput { width: 100%; max-width: 340px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 14px; color: var(--text); font-family: 'Courier New', monospace; outline: none; }
  #apiKeyInput:focus { border-color: var(--wx); }
  #saveKey { width: 100%; max-width: 340px; background: var(--wx); color: #06090f; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .setup-note { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; max-width: 300px; }
  #main { display: none; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; padding-top: 8px; }
  .header-sub { font-size: 9px; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; font-family: 'Courier New', monospace; }
  .header-date { font-size: 17px; font-weight: 700; }
  .header-time { font-size: 28px; font-family: 'Courier New', monospace; font-weight: 600; line-height: 1; }
  .status-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 5px; }
  .status-dot { display: flex; align-items: center; gap: 3px; font-size: 9px; font-family: 'Courier New', monospace; }
  .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
  .refresh-btn { display: block; width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--dim); font-size: 12px; font-family: inherit; cursor: pointer; margin-bottom: 14px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 14px 16px; position: relative; overflow: hidden; animation: fadeUp .4s ease forwards; }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .card-label { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; font-family: 'Courier New', monospace; margin-bottom: 8px; }
  .card-big { font-size: 26px; font-family: 'Courier New', monospace; font-weight: 600; line-height: 1; margin-bottom: 6px; }
  .card-sub { font-size: 12px; color: var(--dim); }
  .card-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
  .badge { font-size: 11px; font-family: 'Courier New', monospace; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .minmax { display: flex; gap: 10px; margin-top: 6px; }
  .minmax-item { display: flex; flex-direction: column; gap: 2px; }
  .minmax-label { font-size: 8px; color: var(--muted); font-family: 'Courier New', monospace; text-transform: uppercase; }
  .minmax-val { font-size: 16px; font-family: 'Courier New', monospace; font-weight: 600; }
  .divider { width: 1px; background: var(--border); }
  .spinner { width: 14px; height: 14px; border: 2px solid #ffffff15; border-top-color: currentColor; border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; }
  .loading-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .loading-row span { font-size: 12px; color: var(--muted); }
  .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; position: relative; overflow: hidden; animation: fadeUp .4s ease .2s both; }
  .news-sections { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 12px; }
  .news-section-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; }
  .news-item { display: flex; gap: 7px; align-items: flex-start; margin-bottom: 8px; }
  .news-num { font-size: 9px; font-family: 'Courier New', monospace; margin-top: 2px; flex-shrink: 0; opacity: .6; }
  .news-text { font-size: 12px; color: var(--dim); line-height: 1.55; }
  .footer { margin-top: 12px; text-align: right; font-size: 9px; color: var(--muted); font-family: 'Courier New', monospace; }
  .reset-link { font-size: 10px; color: var(--muted); text-decoration: underline; cursor: pointer; background: none; border: none; font-family: inherit; }
</style>
</head>
<body>
<div id="setup">
  <div style="font-size:28px">📊</div>
  <h1>Personal Dashboard</h1>
  <p>Anthropic APIキーを入力してください。キーはこのデバイスにのみ保存されます。</p>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
  <button id="saveKey" onclick="saveApiKey()">保存して開始</button>
  <p class="setup-note">APIキーは <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得できます。</p>
</div>
<div id="main">
  <div class="header">
    <div><div class="header-sub">▸ personal dashboard · 横浜</div><div class="header-date" id="dateStr">—</div></div>
    <div style="text-align:right"><div class="header-time" id="timeStr">--:--:--</div><div class="status-row" id="statusRow"></div></div>
  </div>
  <button class="refresh-btn" onclick="loadAll()">↻ 更新</button>
  <div class="grid3">
    <div class="card"><div class="card-accent" style="background:linear-gradient(90deg,var(--wx),transparent)"></div><div class="card-label">📍 天気</div><div id="content-weather"><div class="loading-row"><span class="spinner" style="color:var(--wx)"></span><span>取得中</span></div></div></div>
    <div class="card"><div class="card-accent" style="background:linear-gradient(90deg,var(--ni),transparent)"></div><div class="card-label">🇯🇵 日経</div><div id="content-nikkei"><div class="loading-row"><span class="spinner" style="color:var(--ni)"></span><span>取得中</span></div></div></div>
    <div class="card"><div class="card-accent" style="background:linear-gradient(90deg,var(--btc),transparent)"></div><div class="card-label">₿ BTC</div><div id="content-btc"><div class="loading-row"><span class="spinner" style="color:var(--btc)"></span><span>取得中</span></div></div></div>
  </div>
  <div class="news-card">
    <div class="card-accent" style="background:linear-gradient(90deg,var(--news),var(--ni),var(--btc))"></div>
    <div class="card-label">📰 今日のニュース</div>
    <div id="content-news"><div class="loading-row"><span class="spinner" style="color:var(--news)"></span><span>取得中（少し時間かかります）</span></div></div>
  </div>
  <div class="footer"><span id="lastUpdated">—</span> JST &nbsp;·&nbsp;<button class="reset-link" onclick="resetKey()">APIキー変更</button></div>
</div>
<script>
let API_KEY='';
const statuses={weather:'loading',nikkei:'loading',btc:'loading',news:'loading'};
const SC={weather:'var(--wx)',nikkei:'var(--ni)',btc:'var(--btc)',news:'var(--news)'};
const SL={weather:'WX',nikkei:'NI225',btc:'BTC',news:'NEWS'};
function saveApiKey(){const v=document.getElementById('apiKeyInput').value.trim();if(!v.startsWith('sk-ant')){alert('形式エラー: sk-ant- で始まるキーを入力');return;}localStorage.setItem('anthropic_api_key',v);API_KEY=v;showMain();}
function resetKey(){if(!confirm('APIキーを削除しますか？'))return;localStorage.removeItem('anthropic_api_key');location.reload();}
function showMain(){document.getElementById('setup').style.display='none';document.getElementById('main').style.display='block';startClock();loadAll();}
function startClock(){function t(){const n=new Date();document.getElementById('timeStr').textContent=n.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});document.getElementById('dateStr').textContent=n.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});}t();setInterval(t,1000);}
function setStatus(k,s){statuses[k]=s;renderStatus();}
function renderStatus(){document.getElementById('statusRow').innerHTML=Object.keys(statuses).map(k=>{const s=statuses[k],c=SC[k];const ds=s==='ok'?`background:${c}`:s==='err'?`background:var(--neg)`:`background:transparent;border:1px solid ${c};animation:pulse 1.5s infinite`;const tc=s==='ok'?c:s==='err'?'var(--neg)':c+'80';return`<span class="status-dot" style="color:${tc}"><span class="dot" style="${ds}"></span>${SL[k]}</span>`;}).join('');}
async function callClaude(prompt){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-calls':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});if(!r.ok){const e=await r.text();throw new Error(`HTTP ${r.status}: ${e.slice(0,200)}`);}const d=await r.json();if(d.error)throw new Error(JSON.stringify(d.error));const t=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');if(!t)throw new Error('No text. Types:'+d.content.map(b=>b.type).join(','));return t;}
function extractJSON(t){const m=t.match(/\{[\s\S]*\}/);if(!m)throw new Error('JSON not found: '+t.slice(0,100));return JSON.parse(m[0]);}
function errHTML(m){return`<div style="color:var(--neg);font-size:11px;line-height:1.5;word-break:break-all;padding-top:4px">❌ ${m}</div>`;}
function loadAll(){['weather','nikkei','btc','news'].forEach(k=>{statuses[k]='loading';document.getElementById('content-'+k).innerHTML=`<div class="loading-row"><span class="spinner" style="color:${SC[k]}"></span><span>取得中</span></div>`;});renderStatus();document.getElementById('lastUpdated').textContent='—';fetchWeather();fetchNikkei();fetchBTC();fetchNews();}
async function fetchWeather(){try{const t=await callClaude('Search current weather Yokohama Japan today. Reply ONLY JSON no markdown: {"temp_now":18,"temp_max":22,"temp_min":12,"condition":"晴れ"}');const d=extractJSON(t);document.getElementById('content-weather').innerHTML=`<div class="card-big" style="color:var(--wx)">${d.temp_now}°</div><div class="card-sub">${d.condition}</div><div class="minmax"><div class="minmax-item"><div class="minmax-label">最高</div><div class="minmax-val" style="color:#fca5a5">${d.temp_max}°</div></div><div class="divider"></div><div class="minmax-item"><div class="minmax-label">最低</div><div class="minmax-val" style="color:#93c5fd">${d.temp_min}°</div></div></div>`;setStatus('weather','ok');}catch(e){document.getElementById('content-weather').innerHTML=errHTML(e.message);setStatus('weather','err');}}
async function fetchNikkei(){try{const t=await callClaude('Search latest Nikkei 225 price today. Reply ONLY JSON no markdown: {"price":38500,"change":-200,"pct":-0.52}');const d=extractJSON(t);const u=d.change>=0;document.getElementById('content-nikkei').innerHTML=`<div class="card-big" style="color:var(--ni)">¥${Math.round(d.price).toLocaleString('ja-JP')}</div><div class="card-row"><span style="font-size:12px;font-family:'Courier New',monospace;font-weight:600;color:${u?'var(--pos)':'var(--neg)'}">${u?'▲':'▼'} ${Math.abs(Math.round(d.change)).toLocaleString()}</span><span class="badge" style="color:${u?'var(--pos)':'var(--neg)'};background:${u?'#34d39920':'#f8717120'}">${u?'+':''}${Number(d.pct).toFixed(2)}%</span></div>`;setStatus('nikkei','ok');}catch(e){document.getElementById('content-nikkei').innerHTML=errHTML(e.message);setStatus('nikkei','err');}}
async function fetchBTC(){try{const t=await callClaude('Search current Bitcoin BTC price USD now. Reply ONLY JSON no markdown: {"price":85000,"pct_24h":-1.2}');const d=extractJSON(t);const u=d.pct_24h>=0;document.getElementById('content-btc').innerHTML=`<div class="card-big" style="color:var(--btc);font-size:20px">$${Number(d.price).toLocaleString('en-US',{maximumFractionDigits:0})}</div><div class="card-row"><span class="badge" style="color:${u?'var(--pos)':'var(--neg)'};background:${u?'#34d39920':'#f8717120'}">${u?'+':''}${Number(d.pct_24h).toFixed(2)}% 24h</span></div>`;setStatus('btc','ok');}catch(e){document.getElementById('content-btc').innerHTML=errHTML(e.message);setStatus('btc','err');}}
async function fetchNews(){try{const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});const t=await callClaude(`Search today (${today}) top Japan news. Reply ONLY JSON no markdown: {"economy":["h1","h2","h3"],"entertainment":["h1","h2","h3"],"politics":["h1","h2","h3"]} Real Japanese headlines under 36 chars.`);const d=extractJSON(t);const secs=[{key:'economy',label:'📈 経済',color:'var(--ni)'},{key:'entertainment',label:'🎬 エンタメ',color:'#a78bfa'},{key:'politics',label:'🏛 政治',color:'var(--btc)'}];document.getElementById('content-news').innerHTML='<div class="news-sections">'+secs.map(s=>`<div><div class="news-section-title" style="color:${s.color}">${s.label}</div>${(d[s.key]||[]).map((h,i)=>`<div class="news-item"><span class="news-num" style="color:${s.color}">0${i+1}</span><span class="news-text">${h}</span></div>`).join('')}</div>`).join('')+'</div>';setStatus('news','ok');document.getElementById('lastUpdated').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});}catch(e){document.getElementById('content-news').innerHTML=errHTML(e.message);setStatus('news','err');}}
window.addEventListener('DOMContentLoaded',()=>{const s=localStorage.getItem('anthropic_api_key');if(s){API_KEY=s;showMain();}renderStatus();});
</script>
</body>
</html>
