<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #06090f; --card: #0c1220; --border: #192840;
    --text: #dde4f0; --muted: #3a5070; --dim: #7a90a8;
    --wx: #38bdf8; --ni: #fbbf24; --btc: #f97316; --news: #34d399;
    --neg: #f87171; --pos: #34d399;
  }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
  body { padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 16px) 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; padding: 32px 16px; }
  #setup h1 { font-size: 20px; font-weight: 700; }
  #setup p { font-size: 13px; color: var(--dim); text-align: center; line-height: 1.6; max-width: 300px; }
  #setup a { color: var(--wx); }
  #apiKeyInput { width: 100%; max-width: 340px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: var(--text); font-family: 'Courier New', monospace; outline: none; }
  #apiKeyInput:focus { border-color: var(--wx); }
  #saveKey { width: 100%; max-width: 340px; background: var(--wx); color: #06090f; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .setup-note { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.6; max-width: 300px; }
  #main { display: none; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; padding-top: 4px; }
  .header-sub { font-size: 9px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; font-family: 'Courier New', monospace; }
  .header-date { font-size: 17px; font-weight: 700; }
  .header-time { font-size: 26px; font-family: 'Courier New', monospace; font-weight: 600; line-height: 1; text-align: right; }
  .status-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .status-dot { display: flex; align-items: center; gap: 3px; font-size: 9px; font-family: 'Courier New', monospace; }
  .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
  .refresh-btn { display: block; width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--dim); font-size: 12px; font-family: inherit; cursor: pointer; margin-bottom: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 12px 14px; position: relative; overflow: hidden; animation: fadeUp .4s ease forwards; }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .card-label { font-size: 9px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; font-family: 'Courier New', monospace; margin-bottom: 8px; }
  .card-big { font-size: 24px; font-family: 'Courier New', monospace; font-weight: 600; line-height: 1; margin-bottom: 5px; }
  .card-sub { font-size: 11px; color: var(--dim); }
  .card-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
  .badge { font-size: 10px; font-family: 'Courier New', monospace; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
  .minmax { display: flex; gap: 8px; margin-top: 6px; }
  .minmax-item { display: flex; flex-direction: column; gap: 2px; }
  .minmax-label { font-size: 8px; color: var(--muted); font-family: 'Courier New', monospace; text-transform: uppercase; }
  .minmax-val { font-size: 15px; font-family: 'Courier New', monospace; font-weight: 600; }
  .divider-v { width: 1px; background: var(--border); }
  .spinner { width: 13px; height: 13px; border: 2px solid #ffffff15; border-top-color: currentColor; border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; flex-shrink: 0; }
  .loading-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .loading-row span { font-size: 11px; color: var(--muted); }
  .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; position: relative; overflow: hidden; animation: fadeUp .4s ease .15s both; }
  .news-sections { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 10px; }
  .news-section-title { font-size: 12px; font-weight: 700; margin-bottom: 7px; }
  .news-item { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 7px; }
  .news-num { font-size: 9px; font-family: 'Courier New', monospace; margin-top: 2px; flex-shrink: 0; opacity: .5; }
  .news-text { font-size: 12px; color: var(--dim); line-height: 1.55; }
  .footer { margin-top: 10px; text-align: right; font-size: 9px; color: var(--muted); font-family: 'Courier New', monospace; }
  .reset-link { font-size: 10px; color: var(--muted); text-decoration: underline; cursor: pointer; background: none; border: none; font-family: inherit; }
  .err { color: var(--neg); font-size: 10px; line-height: 1.5; word-break: break-all; padding-top: 4px; }
</style>
</head>
<body>
<div id="setup">
  <div style="font-size:32px">📊</div>
  <h1>Personal Dashboard</h1>
  <p>Anthropic APIキーを入力。キーはこのデバイスにのみ保存されます。</p>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
  <button id="saveKey" onclick="saveApiKey()">保存して開始</button>
  <p class="setup-note">取得先: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys</p>
</div>
<div id="main">
  <div class="header">
    <div><div class="header-sub">▸ dashboard · 横浜</div><div class="header-date" id="dateStr">—</div></div>
    <div><div class="header-time" id="timeStr">--:--:--</div><div class="status-row" id="statusRow"></div></div>
  </div>
  <button class="refresh-btn" onclick="loadAll()">↻ 更新</button>
  <div class="grid3">
    <div class="card"><div class="card-accent" style="background:linear-gradient(90deg,var(--wx),transparent)"></div><div class="card-label">📍 天気</div><div id="cw"><div class="loading-row"><span class="spinner" style="color:var(--wx)"></span><span>取得中</span></div></div></div>
    <div class="card"><div class="card-accent" style="background:linear-gradient(90deg,var(--ni),transparent)"></div><div class="card-label">🇯🇵 日経</div><div id="cn"><div class="loading-row"><span class="spinner" style="color:var(--ni)"></span><span>取得中</span></div></div></div>
    <div class="card"><div class="card-accent" style="background:linear-gradient(90deg,var(--btc),transparent)"></div><div class="card-label">₿ BTC</div><div id="cb"><div class="loading-row"><span class="spinner" style="color:var(--btc)"></span><span>取得中</span></div></div></div>
  </div>
  <div class="news-card">
    <div class="card-accent" style="background:linear-gradient(90deg,var(--news),var(--ni),var(--btc))"></div>
    <div class="card-label">📰 今日のニュース</div>
    <div id="cnews"><div class="loading-row"><span class="spinner" style="color:var(--news)"></span><span>取得中…</span></div></div>
  </div>
  <div class="footer"><span id="lu">—</span> JST &nbsp;·&nbsp;<button class="reset-link" onclick="resetKey()">APIキー変更</button></div>
</div>
<script>
let AK='';
const SC={w:'var(--wx)',n:'var(--ni)',b:'var(--btc)',news:'var(--news)'};
const SL={w:'WX',n:'NI225',b:'BTC',news:'NEWS'};
const ST={w:'loading',n:'loading',b:'loading',news:'loading'};

function saveApiKey(){const v=document.getElementById('apiKeyInput').value.trim();if(!v.startsWith('sk-ant')){alert('形式が違います');return;}localStorage.setItem('dk',v);AK=v;showMain();}
function resetKey(){if(!confirm('APIキーを削除しますか？'))return;localStorage.removeItem('dk');location.reload();}
function showMain(){document.getElementById('setup').style.display='none';document.getElementById('main').style.display='block';startClock();loadAll();}
function startClock(){function t(){const n=new Date();document.getElementById('timeStr').textContent=n.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});document.getElementById('dateStr').textContent=n.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});}t();setInterval(t,1000);}
function setSt(k,s){ST[k]=s;renderSt();}
function renderSt(){document.getElementById('statusRow').innerHTML=Object.keys(ST).map(k=>{const s=ST[k],c=SC[k];const ds=s==='ok'?`background:${c}`:s==='err'?`background:var(--neg)`:`background:transparent;border:1px solid ${c};animation:pulse 1.5s infinite`;const tc=s==='ok'?c:s==='err'?'var(--neg)':c+'80';return`<span class="status-dot" style="color:${tc}"><span class="dot" style="${ds}"></span>${SL[k]}</span>`;}).join('');}
function e(msg){return`<div class="err">❌ ${msg}</div>`;}
function loadAll(){['w','n','b','news'].forEach(k=>{ST[k]='loading';});renderSt();document.getElementById('lu').textContent='—';
  document.getElementById('cw').innerHTML=`<div class="loading-row"><span class="spinner" style="color:var(--wx)"></span><span>取得中</span></div>`;
  document.getElementById('cn').innerHTML=`<div class="loading-row"><span class="spinner" style="color:var(--ni)"></span><span>取得中</span></div>`;
  document.getElementById('cb').innerHTML=`<div class="loading-row"><span class="spinner" style="color:var(--btc)"></span><span>取得中</span></div>`;
  document.getElementById('cnews').innerHTML=`<div class="loading-row"><span class="spinner" style="color:var(--news)"></span><span>取得中…</span></div>`;
  fetchWeather();fetchBTC();fetchNikkeiNews();}

// 天気: Open-Meteo (無料・CORS対応)
async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.4437&longitude=139.638&daily=temperature_2m_max,temperature_2m_min,weathercode&current_weather=true&timezone=Asia/Tokyo&forecast_days=1');
    const d=await r.json();
    const code=d.current_weather.weathercode;
    const cond=code===0?'快晴':code<=1?'晴れ':code<=3?'曇り':code<=67?'雨':code<=77?'雪':'にわか雨';
    const now=Math.round(d.current_weather.temperature);
    const max=Math.round(d.daily.temperature_2m_max[0]);
    const min=Math.round(d.daily.temperature_2m_min[0]);
    document.getElementById('cw').innerHTML=`<div class="card-big" style="color:var(--wx)">${now}°</div><div class="card-sub">${cond}</div><div class="minmax"><div class="minmax-item"><div class="minmax-label">最高</div><div class="minmax-val" style="color:#fca5a5">${max}°</div></div><div class="divider-v"></div><div class="minmax-item"><div class="minmax-label">最低</div><div class="minmax-val" style="color:#93c5fd">${min}°</div></div></div>`;
    setSt('w','ok');
  }catch(err){document.getElementById('cw').innerHTML=e(err.message);setSt('w','err');}
}

// BTC: CoinGecko (無料・CORS対応)
async function fetchBTC(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true');
    const d=await r.json();
    const price=d.bitcoin.usd;
    const pct=d.bitcoin.usd_24h_change;
    const up=pct>=0;
    document.getElementById('cb').innerHTML=`<div class="card-big" style="color:var(--btc);font-size:18px">$${price.toLocaleString('en-US',{maximumFractionDigits:0})}</div><div class="card-row"><span class="badge" style="color:${up?'var(--pos)':'var(--neg)'};background:${up?'#34d39920':'#f8717120'}">${up?'+':''}${pct.toFixed(2)}% 24h</span></div>`;
    setSt('b','ok');
  }catch(err){document.getElementById('cb').innerHTML=e(err.message);setSt('b','err');}
}

// 日経＋ニュース: Claude API
async function fetchNikkeiNews(){
  if(!AK){document.getElementById('cn').innerHTML=e('APIキー未設定');document.getElementById('cnews').innerHTML=e('APIキー未設定');setSt('n','err');setSt('news','err');return;}
  fetchNikkei();
  fetchNews();
}

async function callClaude(prompt){
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-calls':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
  if(!res.ok){const t=await res.text();throw new Error(`HTTP ${res.status}: ${t.slice(0,120)}`);}
  const data=await res.json();
  if(data.error)throw new Error(JSON.stringify(data.error));
  const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!text)throw new Error('no text, types:'+data.content.map(b=>b.type).join(','));
  return text;
}
function getJSON(text){const m=text.match(/\{[\s\S]*\}/);if(!m)throw new Error('JSON未検出');return JSON.parse(m[0]);}

async function fetchNikkei(){
  try{
    const t=await callClaude('Search latest Nikkei 225 closing price today. Reply ONLY JSON no markdown: {"price":38500,"change":-200,"pct":-0.52}');
    const d=getJSON(t);const u=d.change>=0;
    document.getElementById('cn').innerHTML=`<div class="card-big" style="color:var(--ni)">¥${Math.round(d.price).toLocaleString('ja-JP')}</div><div class="card-row"><span style="font-size:11px;font-family:'Courier New',monospace;font-weight:600;color:${u?'var(--pos)':'var(--neg)'}">${u?'▲':'▼'} ${Math.abs(Math.round(d.change)).toLocaleString()}</span><span class="badge" style="color:${u?'var(--pos)':'var(--neg)'};background:${u?'#34d39920':'#f8717120'}">${u?'+':''}${Number(d.pct).toFixed(2)}%</span></div>`;
    setSt('n','ok');
  }catch(err){document.getElementById('cn').innerHTML=e(err.message);setSt('n','err');}
}

async function fetchNews(){
  try{
    const today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
    const t=await callClaude(`Search today (${today}) top Japan news. Reply ONLY JSON no markdown: {"economy":["h1","h2","h3"],"entertainment":["h1","h2","h3"],"politics":["h1","h2","h3"]} Real Japanese headlines under 34 chars.`);
    const d=getJSON(t);
    const secs=[{key:'economy',label:'📈 経済',color:'var(--ni)'},{key:'entertainment',label:'🎬 エンタメ',color:'#a78bfa'},{key:'politics',label:'🏛 政治',color:'var(--btc)'}];
    document.getElementById('cnews').innerHTML='<div class="news-sections">'+secs.map(s=>`<div><div class="news-section-title" style="color:${s.color}">${s.label}</div>${(d[s.key]||[]).map((h,i)=>`<div class="news-item"><span class="news-num" style="color:${s.color}">0${i+1}</span><span class="news-text">${h}</span></div>`).join('')}</div>`).join('')+'</div>';
    setSt('news','ok');
    document.getElementById('lu').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
  }catch(err){document.getElementById('cnews').innerHTML=e(err.message);setSt('news','err');}
}

window.addEventListener('DOMContentLoaded',()=>{const s=localStorage.getItem('dk');if(s){AK=s;showMain();}renderSt();});
</script>
</body>
</html>
